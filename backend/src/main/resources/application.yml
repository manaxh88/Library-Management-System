server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/Library_Management_System?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: Asia/Shanghai
  security:
    user:
      name: admin
      password: admin123
      roles: ADMIN

app:
  jwt:
    secret: "replace-with-a-long-secret-key-at-least-32-bytes"
    expiration-minutes: 120
  recommendation:
    python-command: python
    python-script: recommendation/hybrid_recommender.py
    default-top-n: 20
